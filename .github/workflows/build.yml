name: Build and Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        # Win32 release disabled temporarily due recurring Defender false-positive reports.
        arch: [x64, ARM64]

    steps:
      - uses: actions/checkout@v4

      - name: Install NSIS
        run: choco install nsis -y

      - name: Configure CMake
        run: cmake -B build-${{ matrix.arch }} -A ${{ matrix.arch }} -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build-${{ matrix.arch }} --config Release

      - name: Binary Size Gate
        shell: pwsh
        run: |
          $exe = Resolve-Path "build-${{ matrix.arch }}/Release/technical-standard-note.exe"
          $sizeBytes = (Get-Item $exe).Length
          $limitMb = 8
          $limitBytes = $limitMb * 1MB
          Write-Host "technical-standard-note.exe size: $([math]::Round($sizeBytes / 1MB, 2)) MB (limit: $limitMb MB)"
          if ($sizeBytes -gt $limitBytes) {
            throw "Binary size gate failed: $sizeBytes bytes exceeds $limitBytes bytes."
          }

      - name: Run Core Logic Tests (x64)
        if: matrix.arch == 'x64'
        shell: pwsh
        run: |
          ctest --test-dir "build-${{ matrix.arch }}" -C Release --output-on-failure

      - name: Run Performance Benchmark Gate (x64)
        if: matrix.arch == 'x64' && github.ref == 'refs/heads/main'
        shell: pwsh
        run: |
          $exe = Resolve-Path "build-${{ matrix.arch }}/Release/technical-standard-note.exe"
          & "./tools/benchmark-gate.ps1" `
            -ExePath $exe `
            -MaxAttempts 3 `
            -MinExpectedCases 5

      - name: Collect Benchmark Report (x64)
        if: always() && matrix.arch == 'x64' && github.ref == 'refs/heads/main'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "build-${{ matrix.arch }}/benchmark-reports" | Out-Null
          $srcDir = Join-Path $env:LOCALAPPDATA "TechnicalStandardNote\\benchmarks"
          if (Test-Path $srcDir) {
            $latest = Get-ChildItem $srcDir -Filter "benchmark-*.txt" | Sort-Object LastWriteTime -Descending | Select-Object -First 1
            if ($latest) {
              Copy-Item $latest.FullName "build-${{ matrix.arch }}/benchmark-reports/" -Force
            }
          }

      - name: Package (NSIS)
        run: cpack --config build-${{ matrix.arch }}/CPackConfig.cmake -C Release

      - name: Collect Setup Installer
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path "." -File -Filter "technical-standard-note-*-${{ matrix.arch }}.exe" |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if (-not $installer) {
            throw "NSIS installer not found for architecture ${{ matrix.arch }}."
          }
          Copy-Item $installer.FullName "build-${{ matrix.arch }}/technical-standard-note-setup-${{ matrix.arch }}.exe" -Force

      - name: Create Portable Zip
        shell: pwsh
        run: |
          $stage = "build-${{ matrix.arch }}/portable-stage"
          $zip = "build-${{ matrix.arch }}/technical-standard-note-portable-${{ matrix.arch }}.zip"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item "build-${{ matrix.arch }}/Release/technical-standard-note.exe" "$stage/technical-standard-note.exe" -Force
          Copy-Item "LICENSE" "$stage/LICENSE.txt" -Force
          Copy-Item "README.md" "$stage/README.md" -Force
          Compress-Archive -Path "$stage/*" -DestinationPath $zip -Force

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: technical-standard-note-${{ matrix.arch }}
          if-no-files-found: ignore
          path: |
            build-${{ matrix.arch }}/technical-standard-note-setup-${{ matrix.arch }}.exe
            build-${{ matrix.arch }}/technical-standard-note-portable-${{ matrix.arch }}.zip
            build-${{ matrix.arch }}/benchmark-reports/benchmark-*.txt

  android_build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK Packages
        run: |
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Prepare Release Keystore (optional)
        env:
          TSN_RELEASE_STORE_FILE_B64: ${{ secrets.TSN_RELEASE_STORE_FILE_B64 }}
          TSN_RELEASE_STORE_PASSWORD: ${{ secrets.TSN_RELEASE_STORE_PASSWORD }}
          TSN_RELEASE_KEY_ALIAS: ${{ secrets.TSN_RELEASE_KEY_ALIAS }}
          TSN_RELEASE_KEY_PASSWORD: ${{ secrets.TSN_RELEASE_KEY_PASSWORD }}
        run: |
          if [ -n "$TSN_RELEASE_STORE_FILE_B64" ]; then
            KEYSTORE_PATH="$RUNNER_TEMP/tsn-release.jks"
            echo "$TSN_RELEASE_STORE_FILE_B64" | base64 --decode > "$KEYSTORE_PATH"
            echo "TSN_RELEASE_STORE_FILE=$KEYSTORE_PATH" >> "$GITHUB_ENV"
            echo "TSN_RELEASE_STORE_PASSWORD=$TSN_RELEASE_STORE_PASSWORD" >> "$GITHUB_ENV"
            echo "TSN_RELEASE_KEY_ALIAS=$TSN_RELEASE_KEY_ALIAS" >> "$GITHUB_ENV"
            echo "TSN_RELEASE_KEY_PASSWORD=$TSN_RELEASE_KEY_PASSWORD" >> "$GITHUB_ENV"
          fi

      - name: Build Android Release (APK + AAB)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew :app:assembleRelease :app:bundleRelease

      - name: Collect Android Artifacts
        shell: bash
        run: |
          mkdir -p android/dist
          cp android/app/build/outputs/apk/release/app-release.apk android/dist/technical-standard-note-mobile-release.apk
          cp android/app/build/outputs/bundle/release/app-release.aab android/dist/technical-standard-note-mobile-release.aab
          sha256sum android/dist/technical-standard-note-mobile-release.apk > android/dist/technical-standard-note-mobile-release.apk.sha256
          sha256sum android/dist/technical-standard-note-mobile-release.aab > android/dist/technical-standard-note-mobile-release.aab.sha256

      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: technical-standard-note-android
          if-no-files-found: error
          path: |
            android/dist/technical-standard-note-mobile-release.apk
            android/dist/technical-standard-note-mobile-release.aab
            android/dist/technical-standard-note-mobile-release.apk.sha256
            android/dist/technical-standard-note-mobile-release.aab.sha256

  release:
    needs: [build, android_build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate SHA256 Checksums
        run: |
          find artifacts -type f \( -name "*.exe" -o -name "*.zip" -o -name "*.apk" -o -name "*.aab" \) -print0 | xargs -0 sha256sum > release-sha256.txt

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/**/technical-standard-note-setup-*.exe
            artifacts/**/technical-standard-note-portable-*.zip
            artifacts/**/technical-standard-note-mobile-release.apk
            artifacts/**/technical-standard-note-mobile-release.aab
            artifacts/**/technical-standard-note-mobile-release.apk.sha256
            artifacts/**/technical-standard-note-mobile-release.aab.sha256
            artifacts/**/benchmark-*.txt
            release-sha256.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

